<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Sign In</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="auth-container">
        <!-- Left Side - Brand -->
        <div class="brand-section">
            <div class="brand-content">
                <div class="brand-logo">
                    <div class="logo-container">
                        <div class="logo-icon">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-5-9h10v2H7z"/>
                            </svg>
                        </div>
                        <span class="logo-text">nexus</span>
                    </div>
                </div>
                <h1 class="brand-title">
                    Where ideas<br>
                    <span>connect.</span>
                </h1>
                <h2 class="brand-subtitle">Join the conversation.</h2>
                
                <div class="feature-pills">
                    <span class="pill"><i>✦</i> Share thoughts</span>
                    <span class="pill"><i>✦</i> Connect globally</span>
                    <span class="pill"><i>✦</i> Discover</span>
                    <span class="pill"><i>✦</i> Create community</span>
                </div>
            </div>
        </div>

        <!-- Right Side - Auth -->
        <div class="auth-section">
            <div class="auth-content">
                <div class="auth-header">
                    <h2>Welcome back</h2>
                    <p>Sign in to continue to Nexus</p>
                </div>

                <form id="loginForm">
                    <div class="form-group">
                        <input type="email" id="email" class="form-input" placeholder="Email address" required>
                        <div id="emailError" class="field-error hidden"></div>
                    </div>

                    <div class="form-group">
                        <div class="password-wrapper">
                            <input type="password" id="password" class="form-input" placeholder="Password" required>
                            <button type="button" class="password-toggle" id="togglePassword">
                                <svg viewBox="0 0 24 24">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                    <line x1="3" y1="4" x2="21" y2="20" style="display: none;" id="eyeSlash"/>
                                </svg>
                            </button>
                        </div>
                        <div id="passwordError" class="field-error hidden"></div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox" id="remember">
                            <span class="checkmark"></span>
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-link" id="forgotPassword">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary">Sign in</button>
                </form>

                <div class="terms-card">
                    <div class="terms-text">
                        By signing in, you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>, including <a href="#">Cookies</a>.
                    </div>
                </div>

                <div class="divider">
                    <span class="divider-line"></span>
                    <span>New to Nexus?</span>
                    <span class="divider-line"></span>
                </div>

                <a href="register.html" class="btn btn-secondary">Create account</a>
            </div>
        </div>
    </div>

    <script src="../js/storage.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/login.js"></script>
</body>
</html>
